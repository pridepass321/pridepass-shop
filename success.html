<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed • PridePass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: Inter, system-ui, sans-serif; background: #050508; color: #e2e8f0; min-height: 100vh; }
        .title-gradient {
            background: linear-gradient(90deg, #f472b6, #c084fc, #60a5fa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
    </style>
</head>
<body class="flex items-center justify-center p-6">
    <div class="max-w-lg w-full text-center">
        <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-emerald-500/15 flex items-center justify-center">
            <i class="fa-solid fa-check text-4xl text-emerald-400"></i>
        </div>
        <h1 class="text-3xl font-bold title-gradient mb-3">Thank you!</h1>
        <p class="text-slate-400 mb-2">Your PridePass order is confirmed.</p>
        <p id="order-ref" class="text-sm text-violet-300 font-mono mb-4"></p>
        <p id="payment-status" class="text-sm text-slate-500 mb-8"></p>
        <p class="text-slate-500 text-sm mb-8 leading-relaxed">
            We'll print your premium PVC card and ship it to you.
            Questions? Email <a href="mailto:pridepass321@gmail.com" class="text-violet-400 hover:underline">pridepass321@gmail.com</a>
        </p>
        <a href="/" class="inline-flex items-center gap-2 px-6 py-3 rounded-2xl bg-violet-600 hover:bg-violet-500 text-white font-semibold transition-colors">
            <i class="fa-solid fa-arrow-left"></i> Back to PridePass
        </a>
    </div>
    <script>
        const params = new URLSearchParams(location.search);
        const orderId = params.get('order_id');
        const paypalToken = params.get('token');
        const statusEl = document.getElementById('payment-status');

        if (orderId) document.getElementById('order-ref').textContent = 'Order ' + orderId;

        async function finalizePayPal() {
            if (!orderId || !paypalToken) return;
            statusEl.textContent = 'Confirming your payment…';
            try {
                const res = await fetch('/api/capture-paypal-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orderId, paypalOrderId: paypalToken })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Payment confirmation failed');
                statusEl.textContent = 'Payment confirmed. Thank you!';
            } catch (err) {
                statusEl.textContent = err.message;
                statusEl.classList.add('text-rose-400');
            }
        }

        finalizePayPal();
    </script>
</body>
</html>
