# PridePass — pridepass.shop
# One-click deploy: https://render.com/deploy?repo=https://github.com/pridepass321/pridepass-shop

services:
  - type: web
    name: pridepass
    runtime: python
    plan: free
    repo: https://github.com/pridepass321/pridepass-shop
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PAYMENT_PROVIDER
        value: paypal
      - key: PAYPAL_MODE
        value: sandbox
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ORDER_NOTIFY_EMAIL
        value: pridepass321@gmail.com
    healthCheckPath: /
    autoDeploy: true