# PridePass — pridepass.shop
# One-click deploy: https://render.com/deploy?repo=https://github.com/pridepass321/pridepass-shop

services:
  - type: web
    name: pridepass
    runtime: python
    plan: free
    repo: https://github.com/pridepass321/pridepass-shop
    branch: master
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
    healthCheckPath: /
    autoDeploy: true